name: AI Writing Tools
options:
  bundleIdPrefix: com.aitools
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
targets:
  AiWritingTools:
    type: application
    platform: macOS
    sources:
      - AiWritingTools
    resources:
      - Resources
    settings:
      base:
        INFOPLIST_FILE: AiWritingTools/Info.plist
        PRODUCT_NAME: AI Writing Tools
        PRODUCT_MODULE_NAME: AiWritingTools
        PRODUCT_BUNDLE_IDENTIFIER: com.aitools.AiWritingTools
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
    info:
      path: AiWritingTools/Info.plist
      properties:
        NSPrincipalClass: NSApplication
        NSAccessibilityUsageDescription: "AI Writing Tools heeft Accessibility-toegang nodig om geselecteerde tekst te lezen en resultaten te plakken."
  AiWritingToolsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - AiWritingToolsTests
    dependencies:
      - target: AiWritingTools
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AI Writing Tools.app/Contents/MacOS/AI Writing Tools"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.aitools.AiWritingToolsTests
